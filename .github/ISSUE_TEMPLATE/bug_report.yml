name: Bug report
description: Report something not working correctly
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us what you tried and what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: 1.1.0
  - type: textarea
    id: mods
    attributes:
      label: Mods involved
      description: Map name and dependency mod names if known.
  - type: textarea
    id: extra
    attributes:
      label: Extra details
      description: Add screenshots, logs, or anything else helpful.
